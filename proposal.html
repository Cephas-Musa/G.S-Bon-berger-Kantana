<!doctype html>
<html lang="en">
  <head>
    <title>Investment Proposal Request</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />

    <style>
      .form-box {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>

  <body>
    <section class="ftco-section bg-light">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="form-box">
              <h2 class="text-center mb-4">Investment Proposal Request</h2>

              <form>
                <div class="form-group">
                  <label>Selected Project</label>

                  <input
                    type="text"
                    id="projectName"
                    class="form-control"
                    readonly
                  />
                </div>

                <div class="form-group">
                  <label>Full Name</label>
                  <input type="text" class="form-control" required />
                </div>

                <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" class="form-control" required />
                </div>

                <div class="form-group">
                  <label>Phone Number</label>
                  <input type="text" class="form-control" />
                </div>

                <div class="form-group">
                  <label>Organization / Company</label>
                  <input type="text" class="form-control" />
                </div>

                <div class="form-group">
                  <label>Country</label>
                  <input type="text" class="form-control" />
                </div>

                <div class="form-group">
                  <label>Estimated Investment Capacity</label>

                  <select class="form-control">
                    <option>$5,000 - $10,000</option>
                    <option>$10,000 - $25,000</option>
                    <option>$25,000 - $50,000</option>
                    <option>$50,000+</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Message</label>

                  <textarea
                    class="form-control"
                    rows="5"
                    placeholder="Tell us about your interest in this project..."
                  ></textarea>
                </div>

                <div class="text-center mt-4">
                  <button class="btn btn-primary px-5 py-3">
                    Send Request
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const params = new URLSearchParams(window.location.search);
      const project = params.get("project");

      let name = "";

      if (project === "agriculture") {
        name = "Agricultural Production Project";
      }

      if (project === "livestock") {
        name = "Livestock Development Project";
      }

      if (project === "poultry") {
        name = "Poultry Production Project";
      }

      document.getElementById("projectName").value = name;
    </script>
  </body>
</html>
